services:
  app:
    build: .
    container_name: garuda_backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
    depends_on:
      - db
    restart: always
    volumes:
      - .:/app
      - /app/node_modules

  db:
    image: postgres:15
    container_name: garuda_postgres
    restart: always
    environment:
      POSTGRES_DATABASE: ${PGDATABASE}
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

    restart: always

volumes:
  pgdata:
