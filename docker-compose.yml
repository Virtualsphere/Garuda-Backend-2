services:
  db:
    image: postgres:15
    container_name: garuda_postgres
    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${PGDATABASE:-garuda}
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD}

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    container_name: garuda_backend

    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    env_file:
      - .env

    environment:
      DB_HOST: db
      NODE_ENV: production

    ports:
      - "5000:5000"

    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: